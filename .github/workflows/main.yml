name: .NET Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

   # - name: Setup .NET
   #   uses: actions/setup-dotnet@v3
      #with:
        #dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Publish
      run: dotnet publish -c Release -o publish

    - name: Deploy to IIS
      run: |
        Import-Module WebAdministration
        
        # Stop Application Pool
        Stop-WebAppPool -Name "EFCoreApp" -ErrorAction SilentlyContinue
        
        # Remove old files
        Remove-Item "C:\inetpub\wwwroot\EFCoreApp\*" -Recurse -Force -ErrorAction SilentlyContinue
        
        # Copy new published files
        Copy-Item "publish\*" "C:\inetpub\wwwroot\EFCoreApp" -Recurse -Force
        
        # Start Application Pool
        Start-WebAppPool -Name "EFCoreApp"

